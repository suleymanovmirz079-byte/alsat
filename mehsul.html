<!DOCTYPE html>
<html lang="az">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Məhsul yerləşdir - AlSat</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<div class="top">

<h1>➕ AlSat</h1>

<button>
Geri
</button>

</div>


</header>



<section class="form-area">


<h2>
Yeni məhsul yerləşdir
</h2>



<div class="form">


<input type="file" accept="image/*">


<input id="productName" type="text" placeholder="Məhsul adı">



<select>

<option>
Kateqoriya seç
</option>

<option>
Telefon
</option>

<option>
Texnika
</option>

<option>
Beauty
</option>

<option>
Geyim
</option>

<option>
Ev
</option>

</select>


<input id="productPrice" type="number" placeholder="Qiymət (AZN)">



<input id="productCity" type="text" placeholder="Şəhər">




<textarea id="productInfo" placeholder="Məhsul haqqında məlumat"></textarea>




<input id="productPhone" type="text" placeholder="Əlaqə nömrəsi">



<button class="sell" onclick="addProduct()">
Elanı yerləşdir
</button>




</div>


</section>



</body>

</html>
